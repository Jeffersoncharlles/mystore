pre-commit:
  commands:
    check:
      run: pnpm biome format --write {staged_files}
      glob: "*.{js,ts,jsx,tsx,json}"
      stage_fixed: true

pre-push:
  commands:
    validate:
      run: pnpm typecheck
    lint:
      glob: "*.{ts,tsx}"
      run: pnpm biome lint {push_files}
    # test:
    #   run: pnpm test:coverage