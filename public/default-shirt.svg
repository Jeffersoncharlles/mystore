<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- Background -->
  <rect width="400" height="500" fill="#f5f5f5"/>
  
  <!-- Shirt Body -->
  <path d="M 100 80 L 140 60 L 260 60 L 300 80 L 300 280 Q 300 320 280 350 L 120 350 Q 100 320 100 280 Z" fill="#e8e8e8" stroke="#999" stroke-width="2"/>
  
  <!-- Left Sleeve -->
  <ellipse cx="80" cy="120" rx="40" ry="80" fill="#e8e8e8" stroke="#999" stroke-width="2" transform="rotate(-25 80 120)"/>
  
  <!-- Right Sleeve -->
  <ellipse cx="320" cy="120" rx="40" ry="80" fill="#e8e8e8" stroke="#999" stroke-width="2" transform="rotate(25 320 120)"/>
  
  <!-- Neckline -->
  <circle cx="200" cy="75" r="25" fill="#f5f5f5" stroke="#999" stroke-width="2"/>
  
  <!-- Center Button Line -->
  <line x1="200" y1="120" x2="200" y2="300" stroke="#ccc" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Buttons -->
  <circle cx="200" cy="150" r="4" fill="#999"/>
  <circle cx="200" cy="200" r="4" fill="#999"/>
  <circle cx="200" cy="250" r="4" fill="#999"/>
  
  <!-- Text Label -->
  <text x="200" y="420" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#999">Default Shirt</text>
</svg>
